name: Release
run-name: Release ${{ inputs.version }} from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.6.0 or 0.6.0-beta.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.channel.outputs.prerelease }}
      npm_tag: ${{ steps.channel.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Compute release channel
        id: channel
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" =~ -(alpha|beta|rc)\. ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=testing" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" =~ ^([0-9]+\.[0-9]+)\.x$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=${BASH_REMATCH[1]}-latest" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump version and update changelog
        run: |
          node tasks/version.js ${{ inputs.version }}
          node tasks/changelog.js release ${{ inputs.version }}
      - name: Lint, build and test
        run: |
          npm run lint
          npm run build
          npm test
      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -a -m "${{ inputs.version }}"
          git tag v${{ inputs.version }} -m "${{ inputs.version }}"
          git push origin ${{ github.ref_name }} v${{ inputs.version }}

  publish:
    name: Publish to npmjs
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag ${{ needs.tag.outputs.npm_tag }}

  release:
    name: Publish GitHub release
    needs: [tag, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Generate release notes
        run: node tasks/changelog.js notes ${{ inputs.version }} > RELEASE_NOTES.md
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes-file RELEASE_NOTES.md \
            ${{ needs.tag.outputs.prerelease == 'true' && '--prerelease' || '' }}